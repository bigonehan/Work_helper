# id: draft 고유값
id: compact_project_path

# input: 입력되는 값들, 요구되는 값들
input:
  - Full project path strings
  - Project list card display

# output: 현재 기능이 내놓는 결과, 혹은 출력하는 값
output:
  - Compact project path labels use only the final two path segments.
  - The final project folder segment is truncated after four characters with an ellipsis.
  - Full path data remains unchanged for editing and persistence.

# test: 구현 성공 여부를 체크하는 조건 체크리스트
test:
  - bun test test/pathDisplay.test.ts verifies compact path formatting.
  - bun run build completes.

# priority: manager가 우선순위를 판별하는 int 값, 작을수록 먼저 실행
priority: 1

# kind: calc, ui, i/o, action 중 하나
kind: ui

# target: 사용되는 파일, 생성되는 파일, 이용하는 도메인
target:
  - src/pathDisplay.ts
  - components/project-crud.tsx
  - test/pathDisplay.test.ts
  - package.json

# dependsOn: 다른 작업 의존성이 있을 때 참조하는 draft id 목록
dependsOn: []
