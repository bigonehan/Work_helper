# id: draft 고유값
id: settings_modal

# input: 입력되는 값들, 요구되는 값들
input:
  - settings.defaultProjectPath
  - projects page header gear button

# output: 현재 기능이 내놓는 결과, 혹은 출력하는 값
output:
  - A gear icon opens a settings modal.
  - The modal edits the default project creation path.
  - The create form shows the configured default path as its placeholder.

# test: 구현 성공 여부를 체크하는 조건 체크리스트
test:
  - Typecheck the client component state and settings API calls.
  - Verify the settings modal path value is loaded from server-rendered settings.

# priority: manager가 우선순위를 판별하는 int 값, 작을수록 먼저 실행
priority: 2

# kind: calc, ui, i/o, action 중 하나
kind: ui

# target: 사용되는 파일, 생성되는 파일, 이용하는 도메인
target:
  - app/projects/page.tsx
  - components/project-crud.tsx
  - src/types.ts

# dependsOn: 다른 작업 의존성이 있을 때 참조하는 draft id 목록
dependsOn:
  - settings_config
